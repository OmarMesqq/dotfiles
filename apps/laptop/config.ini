[colors]

;true black bg
background = #000000
;(gray) separator and workspace symbol bg
background-alt = #69727f
;battery and workspace font
foreground = #00ff00
;date, time and labels
primary = #05fcf0
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Hack-Regular:style=Regular:size=12;0" 
font-1 = "FontAwesome:size=13;1"
font-2 = "Font Awesome 6 Free:style=Regular:size=13;0"
font-3 = "Font Awesome 6 Free:style=Solid:size=13;0"
font-4 = "Font Awesome 6 Brands:style=Regular:size=14;0"

modules-left = xworkspaces wlan 
modules-center = date battery 
modules-right = pulseaudio memory cpu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
;label-active-underline= #000000
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "Ôö© "
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = "ÔČÄ  <label-charging>"

format-discharging = "ÔČÄ  <label-discharging>" 

format-full-prefix = "ÔČÄ  <label-discharging>"
format-full-prefix-foreground = ${colors.secondary}

ramp-capacity-0 = Óą∂
ramp-capacity-1 = Óą∑
ramp-capacity-2 = Óął
ramp-capacity-foreground = ${colors.secondary}

animation-charging-0 = Óą∂
animation-charging-1 = Óą∑
animation-charging-2 = Óął
animation-charging-foreground = ${colors.secondary}
animation-charging-framerate = 750

animation-discharging-0 = Óął
animation-discharging-1 = Óą∑
animation-discharging-2 = Óą∂
animation-discharging-foreground = ${colors.secondary}
animation-discharging-framerate = 750

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł " 
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%essid%%{F-} 
;label-connected = "Teste" 

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M %d/%m
date-alt = %d/%m/%Y %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/day]
type = custom/script
exec = date +%A

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
